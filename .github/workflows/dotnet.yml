name: .NET CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build build-essential libssl-dev pkg-config libboost-all-dev libsodium-dev

    - name: Setup .NET (8.0.415)
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: |
          8.0.415
          6.0.x

    - name: Restore dependencies
      run: dotnet restore src

    - name: Build solution
      run: dotnet build --configuration Release --no-restore src

    - name: Run tests
      run: dotnet test --logger:"console;verbosity=detailed" --no-build --verbosity normal src
      continue-on-error: true

