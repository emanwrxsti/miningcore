name: .NET CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build build-essential libssl-dev pkg-config libboost-all-dev libsodium-dev

    - name: Setup .NET (6 + 8)
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: |
          8.0.415
          6.0.x

    # --- FIX STARTS HERE ---
    - name: Restore dependencies (core only)
      run: dotnet restore src/Miningcore/Miningcore.csproj

    - name: Build Miningcore
      run: dotnet build --configuration Release --no-restore src/Miningcore/Miningcore.csproj

    - name: Optional Test execution
      run: dotnet test --no-build src/Miningcore.Tests/Miningcore.Tests.csproj
      continue-on-error: true
    # --- FIX ENDS HERE ---

